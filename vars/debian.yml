_node_release: "22"

_apt_key:
  "22":
    - url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
      dest: /etc/apt/keyrings/ndoesource.asc
      checksum: "sha256:b42e0321dabdc24e892115da705cf061167eac12a317f23d329862d0aa0a271d"
    - url: https://download.opensuse.org/repositories/home:/alvistack/Debian_Testing/Release.key
      dest: /etc/apt/keyrings/home-alvistack.asc
      checksum: "sha256:2959bf5709615cba0109715e4c2001066a4536398fa54f0f602abc208f04017e"
  "20":
    - url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
      dest: /etc/apt/keyrings/ndoesource.asc
      checksum: "sha256:b42e0321dabdc24e892115da705cf061167eac12a317f23d329862d0aa0a271d"
    - url: https://download.opensuse.org/repositories/home:/alvistack/Debian_Testing/Release.key
      dest: /etc/apt/keyrings/home-alvistack.asc
      checksum: "sha256:2959bf5709615cba0109715e4c2001066a4536398fa54f0f602abc208f04017e"
  "16": []

_deb822_repository:
  "22":
    - name: nodesource
      types: deb
      uris: https://deb.nodesource.com/node_22.x
      suites: nodistro
      components: main
      signed_by: /etc/apt/keyrings/ndoesource.asc
      enabled: true
      state: present
    - name: home-alvistack
      types: deb
      uris: https://download.opensuse.org/repositories/home:/alvistack/Debian_Testing
      suites: /
      components:
      signed_by: /etc/apt/keyrings/home-alvistack.asc
      enabled: true
      state: present
  "20":
    - name: nodesource
      types: deb
      uris: https://deb.nodesource.com/node_20.x
      suites: nodistro
      components: main
      signed_by: /etc/apt/keyrings/ndoesource.asc
      enabled: true
      state: present
    - name: home-alvistack
      types: deb
      uris: https://download.opensuse.org/repositories/home:/alvistack/Debian_Testing
      suites: /
      components:
      signed_by: /etc/apt/keyrings/home-alvistack.asc
      enabled: true
      state: present
  "16": []

_apt:
  "22":
    - { state: latest, name: g++ }
    - { state: latest, name: make }
    - { state: latest, name: nodejs }
    - { state: latest, name: eslint }
    - { state: latest, name: prettier }
    - { state: latest, name: sass }
    - { state: latest, name: stylelint }
    - { state: latest, name: uglifyjs }
  "20":
    - { state: latest, name: g++ }
    - { state: latest, name: make }
    - { state: latest, name: nodejs }
    - { state: latest, name: eslint }
    - { state: latest, name: prettier }
    - { state: latest, name: sass }
    - { state: latest, name: stylelint }
    - { state: latest, name: uglifyjs }
  "16": []
